spring:
  datasource:
    url: jdbc:h2:mem:renaultdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
#    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG